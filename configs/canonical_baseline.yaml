name: canonical_baseline
version: "2026-05-14"
canonical: true
description: >
  Active baseline entry for current and future experiments. This file is the
  only live baseline config; new experiment configs should extend it and only
  override the changed fields.

common:
  seed: 42
  fold: 0
  n_folds: 4
  samples_path: manifests/samples.csv
  device: cuda
  amp: true
  use_imagenet_normalize: true

stage1:
  patch_out_size: 384
  batch_size: 128
  epochs: 30

  encoder_lr: 5.0e-5
  decoder_lr: 2.0e-4
  weight_decay: 1.0e-4

  bce_weight: 0.5
  dice_weight: 0.5
  pos_weight: 12.0

  freeze_encoder_epochs: 3
  early_stop_patience: 12
  early_stop_min_delta: 0.0

  lr_factor: 0.5
  lr_patience: 3
  min_lr: 1.0e-7

  num_workers: 8
  pretrained: true
  allow_pretrained_fallback: false

  augment_enable: true
  augment_hflip_p: 0.5
  augment_vflip_p: 0.5
  augment_rotate_deg: 15
  augment_brightness: 0.15
  augment_contrast: 0.15
  augment_gamma: 0.15
  augment_noise_std: 0.02
  augment_blur_p: 0.15

  stage1_sampler_mode: balanced
  stage1_positive_ratio: 0.50
  stage1_defect_negative_ratio: 0.25
  stage1_normal_ratio: 0.25
  stage1_use_replay: true
  stage1_replay_ratio: 0.15
  stage1_replay_warmup_epochs: 3
  stage1_replay_refresh_every: 3
  stage1_max_replay_ratio: 0.20
  stage1_eval_threshold: 0.50
  stage1_target_negative_fpr: 0.20
  stage1_negative_fpr_penalty: 0.5

  positive_center_crop_sizes: [320, 384, 448]
  positive_shift_crop_sizes: [320, 384, 448]
  positive_context_crop_sizes: [384, 448]
  positive_boundary_crop_sizes: [320, 384, 448]
  negative_crop_sizes: [320, 384, 448]

  positive_center_count_per_image: 1
  positive_shift_count_per_image: 2
  positive_context_count_per_image: 1
  positive_boundary_count_per_image: 2
  near_miss_negative_count_per_image: 2
  hard_negative_count_per_image: 3
  near_miss_margin_min: 8
  near_miss_margin_max: 20
  hard_negative_safety_margin: 24
  patch_dedup_iou: 0.70
  max_components_per_image: 3
  max_positive_patches_per_image: 6
  max_attempts_per_patch: 20

  train_index_path_template: manifests/stage1_fold{fold}_train_index.csv
  val_index_path_template: manifests/stage1_fold{fold}_val_index.csv
  patch_summary_path: manifests/stage1_patch_summary.json
  patch_train_seed_offset: 1000
  patch_val_seed_offset: 2000
  save_dir_template: outputs/experiments/canonical_baseline/stage1/fold{fold}

stage2:
  model_name: canonical_resnet34_unet_pw12
  model_variant: resnet34_unet_baseline

  image_size: 640
  stage1_out_size: 384
  patch_out_size: 384
  batch_size: 48
  epochs: 50

  encoder_lr: 2.0e-5
  decoder_lr: 1.0e-4
  weight_decay: 1.0e-4

  bce_weight: 0.5
  dice_weight: 0.5
  pos_weight: 12.0
  normal_fp_loss_weight: 0.0
  normal_fp_topk_ratio: 0.10

  early_stop_patience: 16
  early_stop_min_delta: 0.0

  lr_factor: 0.5
  lr_patience: 4
  min_lr: 1.0e-7

  num_workers: 8
  pretrained: false
  allow_pretrained_fallback: false
  auto_evaluate_after_train: true
  auto_evaluate_strict: true

  threshold: 0.50
  train_eval_threshold: 0.50
  train_eval_min_area: 0

  augment_enable: true
  augment_hflip_p: 0.5
  augment_vflip_p: 0.5
  augment_rotate_deg: 10
  augment_brightness: 0.10
  augment_contrast: 0.10
  augment_gamma: 0.0
  augment_noise_std: 0.015
  augment_blur_p: 0.0

  target_normal_fpr: 0.10
  lambda_fpr_penalty: 2.0
  threshold_grid_start: 0.10
  threshold_grid_end: 0.95
  threshold_grid_step: 0.02
  min_area_grid: [0, 8, 16, 24, 32, 48]

  random_normal_k_factor: 1.0
  use_hard_normal_replay: true
  stage2_hard_normal_ratio: 0.40
  hard_normal_max_repeats_per_epoch: 2
  hard_normal_warmup_epochs: 2
  hard_normal_refresh_every: 2
  hard_normal_pool_factor: 3.0

  stage1_load_strict: true
  stage1_checkpoint_template: outputs/experiments/canonical_baseline/stage1/fold{fold}/best_stage1.pt
  save_dir_template: outputs/experiments/canonical_baseline/stage2/fold{fold}
  global_postprocess_path: outputs/experiments/canonical_baseline/stage2/oof_global_postprocess.json
